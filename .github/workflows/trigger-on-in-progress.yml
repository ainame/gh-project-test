name: Cat file on In Progress

on:
  projects_v2_item:
    types: [edited]

jobs:
  cat-file:
    if: |
      github.event.changes.field_value.field_name == 'Status' &&
      github.event.projects_v2_item.content_type == 'Issue' &&
      github.event.changes.field_value.to.name == 'In Progress'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve issue file path and project IDs
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          result=$(gh api graphql -f query='
            query($nodeId: ID!) {
              node(id: $nodeId) {
                ... on Issue { title }
              }
              organization(login: "ainame-org") {
                projectV2(number: 3) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                }
              }
            }
          ' -f nodeId="${{ github.event.projects_v2_item.content_node_id }}")

          echo "file=$(echo "$result" | jq -r '.data.node.title')" >> $GITHUB_OUTPUT
          echo "project_id=$(echo "$result" | jq -r '.data.organization.projectV2.id')" >> $GITHUB_OUTPUT
          echo "field_id=$(echo "$result" | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Status") | .id')" >> $GITHUB_OUTPUT
          echo "done_id=$(echo "$result" | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name == "Status") | .options[] | select(.name == "Done") | .id')" >> $GITHUB_OUTPUT

      - name: Cat the file
        run: cat "${{ steps.resolve.outputs.file }}"

      - name: Mark project item as Done
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh project item-edit \
            --id "${{ github.event.projects_v2_item.node_id }}" \
            --project-id "${{ steps.resolve.outputs.project_id }}" \
            --field-id "${{ steps.resolve.outputs.field_id }}" \
            --single-select-option-id "${{ steps.resolve.outputs.done_id }}"
